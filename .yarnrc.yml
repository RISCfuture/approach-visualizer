nodeLinker: pnp

packageExtensions:
  # @primevue/core and @primevue/icons import '@primeuix/styles/base' at runtime
  # but don't declare @primeuix/styles in their own manifests (it's only a dep of
  # the top-level `primevue`). Under PnP's strict resolution that fails
  # ("isn't declared in its dependencies"); declaring it as a peer here lets
  # `primevue` satisfy it from the workspace tree.
  '@primevue/core@*':
    peerDependencies:
      '@primeuix/styles': '*'
  '@primevue/icons@*':
    peerDependencies:
      '@primeuix/styles': '*'
  # @vue/test-utils declares @vue/server-renderer as an optional peer, but its
  # CJS bundle still `require()`s it unconditionally at load time. Under PnP's
  # strict resolution that fails ("isn't provided by your application") unless we
  # make it a real, resolvable dependency. Range stays open (^3.5.0) so it tracks
  # whatever vue 3.5.x is installed rather than pinning vue to an exact version.
  '@vue/test-utils@*':
    dependencies:
      '@vue/server-renderer': ^3.5.0
